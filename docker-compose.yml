services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:oraclelinux9
    container_name: smt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 88888888
      MYSQL_DATABASE: smt_workorder_management
      TZ: Asia/Shanghai
    volumes:
      # 数据持久化到宿主机
      - /data/mysql:/var/lib/mysql
      # 初始化脚本：首次启动时自动执行，按文件名排序执行
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      # MySQL 字符集配置（解决中文乱码的关键）
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      # MySQL 时区配置
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_connections=200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - smt-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:alpine
    container_name: smt-redis
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /data/redis:/data
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smt-network

  # ==================== Spring Boot 后端 ====================
  backend:
    build:
      context: ./backend/smt-workorder-management
      dockerfile: Dockerfile
    container_name: smt-backend
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=40.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+PrintGCDetails
        -XX:+PrintGCTimeStamps
        -Xlog:gc*:file=/tmp/gc.log:time,level,tags
      DB_URL: jdbc:mysql://mysql:3306/smt_workorder_management?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&tinyInt1isBit=false&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: 88888888
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: smt-workorder-management-secret-key-2026-aircookies-change-in-production
      JWT_EXPIRATION: "86400000"
    expose:
      - 8080 # 暴露端口，用于反向代理，仅内部访问，不映射到宿主机
    # 覆盖 Dockerfile 的 ENTRYPOINT，使 JAVA_OPTS 环境变量生效
    entrypoint: >
      sh -c "java ${JAVA_OPTS} -Duser.timezone=Asia/Shanghai -jar app.jar"
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
      # 挂载 RSA 密钥目录：将宿主机上的 keys 目录映射到容器内 /app/keys/
      # RSAUtil 默认从 ./keys/ 读取，WORKDIR 为 /app，所以路径为 /app/keys/
      - ./keys:/app/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smt-network

  # ==================== Nginx（前端 + 反向代理） ====================
  nginx:
    image: nginx:alpine
    container_name: smt-nginx
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/nginx/html:/usr/share/nginx/html
      - /data/nginx/conf:/etc/nginx/conf.d
      - /data/nginx/logs:/var/log/nginx
      - /data/nginx/certs:/etc/nginx/certs:ro
      - /data/nginx/certbot:/var/www/certbot
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - smt-network

  # ==================== Certbot SSL 证书自动续期 ====================
  certbot:
    image: certbot/certbot
    container_name: smt-certbot
    volumes:
      - /data/nginx/certs:/etc/letsencrypt
      - /data/nginx/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done'"
    restart: unless-stopped
    networks:
      - smt-network

networks:
  smt-network:
    driver: bridge
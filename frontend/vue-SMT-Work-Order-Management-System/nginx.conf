server {
    listen 80;
    server_name _; # 通配符域名，匹配所有域名

    root   /usr/share/nginx/html;  # 网页根目录
    index  index.html;             # 默认首页

    access_log  /var/log/nginx/access.log;  # 访问日志路径
    error_log   /var/log/nginx/error.log;   # 错误日志路径

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Vue Router history 模式支持：找不到文件时回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端 — 匹配开发环境 Vite proxy 规则
    # 前端请求 /api/xxx → 转发到 backend:8080/xxx
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
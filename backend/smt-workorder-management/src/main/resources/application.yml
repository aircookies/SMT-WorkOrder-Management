server:
  port: 8080

spring:
  application:
    name: smt-workorder-management
    version: 1.0.0
  datasource:
    url: jdbc:mysql://localhost:3306/smt_workorder_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&tinyInt1isBit=false
    username: root
    password: 88888888
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis :
  # 指定配置文件位置
  mapper-locations: classpath:mapper/*.xml
  # 指定实体类包名
  type-aliases-package: com.aircookies.smtworkordermanagement.entity
  configuration:
    # 开启驼峰命名转换
      map-underscore-to-camel-case: true
    # 允许自动映射
      auto-mapping-behavior: full
    # 设置语句执行超时时间
      default-statement-timeout: 30
    # 日志实现
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true

  # jwt密钥与过期时间环境变量
jwt:
    # 密钥
  secret: ${JWT_SECRET:smt-workorder-management-secret-key-2026-aircookies-change-in-production}
    # 过期时间
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: info

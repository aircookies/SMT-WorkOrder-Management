# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name _;

    # ACME 验证专用目录（用于 Certbot 自动签发/续期证书）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # SSL 证书配置
    ssl_certificate     /etc/nginx/certs/live/aircookies.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/aircookies.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root   /usr/share/nginx/html;
    index  index.html;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_static on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_comp_level 6;

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        # 添加静态资源缓存头
        expires 7d;
        add_header Cache-Control "public, immutable";
        index index.html;
        # Vue Router history 模式支持：找不到文件时回退到 index.html
        try_files $uri $uri/ /index.html;
        # HTML 文件不缓存，确保更新及时生效
        add_header Cache-Control "no-cache";
    }

    # API 反向代理到后端 — 匹配开发环境 Vite proxy 规则
    # 前端请求 /api/xxx → 转发到 backend:8080/xxx
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
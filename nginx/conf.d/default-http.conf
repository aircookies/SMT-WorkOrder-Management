# ==================== HTTP 模式（首次部署用，无 SSL） ====================
# 在没有 SSL 证书时使用此配置，确保 Nginx 能正常启动。
# 获取证书后，替换为 default.conf（HTTPS 配置）。

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME 验证专用目录（用于 Certbot 自动签发/续期证书）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root   /usr/share/nginx/html;
    index  index.html;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_static on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_comp_level 6;

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        index index.html;
        # Vue Router history 模式支持：找不到文件时回退到 index.html
        try_files $uri $uri/ /index.html;
        # HTML 文件不缓存，确保更新及时生效
        add_header Cache-Control "no-cache";
    }

    # API 反向代理到后端 — 匹配开发环境 Vite proxy 规则
    # 前端请求 /api/xxx → 转发到 backend:8080/xxx
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}